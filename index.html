<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nkontabuo</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
.container{max-width:400px;margin:auto;background:white;padding:20px;border-radius:12px}
.btn-green{background:#16a34a;color:white;padding:12px;width:100%;border:none;border-radius:8px;font-size:16px;margin:10px 0}
.transaction{border-bottom:1px solid #eee;padding:10px 0}
</style>
</head>
<body>
<div class="container">
<h1>Nkontabuo</h1>
<p>Track MoMo expenses automatically</p>
<button id="smsBtn" class="btn-green">Connect MoMo SMS</button>
<label><input type="checkbox" id="autoSync"> Auto Sync SMS</label>
<h3>Transactions</h3>
<div id="transactions"></div>
</div>
<script>
document.getElementById('smsBtn').onclick=()=>{
if(window.Android){window.Android.requestSmsPermission()}else{
alert('This will read SMS on Android. Adding demo transaction.');
let d=document.createElement('div');
d.className='transaction';
d.innerHTML='<strong>MTN MoMo</strong><br>GHS 50.00 - Sent to Kofi';
document.getElementById('transactions').prepend(d);
}};
</script>
</body>
</html>
